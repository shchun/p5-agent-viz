<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent | p5.js Dynamic Renderer</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <!-- Main Background -->
    <div class="app-container">
      <header class="app-header">
        <h1>Agentic Visualizer</h1>
        <p class="subtitle">AI 기반 p5.js 동적 화면 생성기</p>
      </header>

      <main class="canvas-container" id="canvas-container">
        <!-- p5 canvas injected here -->
        <div class="empty-state" id="empty-state">
          <div class="glow-orb"></div>
          <h2>명령 대기 중</h2>
          <p>화면에 보고 싶은 장면이나 워크플로우를 자유롭게 묘사해 보세요. 예: "파란색 원 두 개가 통통 튀고 점선으로 연결되어 있어"</p>
        </div>
      </main>

      <div class="prompt-container">
        <form id="prompt-form" class="glass-form">
          <input 
            type="text" 
            id="prompt-input" 
            placeholder="예시: '빨간색 노드가 맥박처럼 뛰고 파란색 상자랑 이어져 있어...'" 
            autocomplete="off"
            required 
          />
          <button type="submit" id="submit-btn" aria-label="생성하기">
            <span class="btn-text">생성 (Generate)</span>
            <div class="spinner loader-hidden" id="loader"></div>
          </button>
        </form>
      </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
